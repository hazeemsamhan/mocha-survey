<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocha Resto Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --mocha-burgundy: #900B4D; --mocha-cream: #EAE7DD; --error-red: #ff4d4d; }
        body { background-color: var(--mocha-burgundy); font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .coffee-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle, #b12c6a 0%, #900B4D 70%); opacity: 0.9; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 4rem; box-shadow: 0 40px 100px rgba(0,0,0,0.4); width: 100%; max-width: 400px; padding: 3rem 2rem; position: relative; }
        .error-msg { color: var(--error-red); font-size: 0.7rem; margin-top: 5px; opacity: 0; transform: translateY(-5px); transition: 0.3s; pointer-events: none; text-align: center; font-weight: bold; }
        .error-msg.visible { opacity: 1; transform: translateY(0); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake-error { animation: shake 0.3s ease-in-out 0s 2; border-color: var(--error-red) !important; }
        .step-container { display: none; animation: slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .step-active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        .dob-box { width: 70px; height: 70px; background: rgba(255, 255, 255, 0.08); border: 2px solid transparent; border-radius: 1.5rem; color: white; text-align: center; font-size: 1.5rem; font-weight: bold; outline: none; transition: 0.3s; }
        .dob-box:focus { border-color: var(--mocha-cream); background: rgba(255, 255, 255, 0.15); transform: scale(1.05); }
        .dob-box-year { width: 110px; }
        .input-field { background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; padding: 1.3rem; width: 100%; outline: none; transition: 0.4s; color: white; text-align: center; font-size: 1.1rem; }
        .mocha-btn { background: var(--mocha-cream); color: var(--mocha-burgundy); font-weight: 900; padding: 1.3rem; border-radius: 1.5rem; width: 100%; transition: 0.4s; cursor: pointer; margin-top: 1rem; position: relative; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.2); border: none; }
        .ready-to-go { animation: glow 1.5s infinite; background: white !important; }
        @keyframes glow { 0% { box-shadow: 0 0 5px var(--mocha-cream); } 50% { box-shadow: 0 0 20px var(--mocha-cream); } 100% { box-shadow: 0 0 5px var(--mocha-cream); } }
        #successCard { display: none; position: fixed; inset: 0; z-index: 10000; background: rgba(144, 11, 77, 0.98); align-items: center; justify-content: center; text-align: center; }
        .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 2rem; position: relative; }
        .progress-fill { height: 100%; background: var(--mocha-cream); width: 50%; transition: 0.5s; border-radius: 2px; box-shadow: 0 0 10px var(--mocha-cream); }
        
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: white; color: var(--mocha-burgundy); padding: 1rem 2rem; border-radius: 2rem; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 10001; opacity: 0; text-align: center; min-width: 250px; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>
    <div class="coffee-bg"></div>
    <div id="toast">أهلاً بك مجدداً في عائلة موكا.. نورتنا! ✨</div>

    <div id="successCard" class="p-8">
        <div class="max-w-xs w-full">
            <h2 id="successMessage" class="text-white text-4xl font-black mb-10 italic">أهلاً بك في عائلة موكا! ✨</h2>
            <button onclick="window.location.href='https://search.google.com/local/writereview?placeid=ChIJL_brEMoqHRURkDsv6pNtnYM'" class="w-full p-5 bg-white text-mocha-burgundy rounded-3xl font-bold mb-4 shadow-2xl">قيمنا على جوجل ⭐</button>
            <button onclick="window.location.href='https://www.instagram.com/mocha.ps/'" class="w-full p-5 bg-white/5 border border-white/10 rounded-3xl text-white/50 font-bold">تابعنا على إنستغرام</button>
        </div>
    </div>

    <div class="glass" id="mainGlass">
        <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
        <div class="text-center mb-10">
            <h1 style="color: var(--mocha-cream); font-size: 2.8rem; font-weight: 900; letter-spacing: -2px; line-height: 0.8;">mocha</h1>
            <p style="color: var(--mocha-cream); font-size: 0.55rem; letter-spacing: 5px; opacity: 0.5; margin-top: 8px; font-weight: bold;">RESTO CAFÉ</p>
        </div>

        <div id="step1" class="step-container step-active">
            <h2 class="text-white text-center text-xl font-bold mb-6">نبدأ باسمك الكريم؟ ✨</h2>
            <div class="space-y-4">
                <div>
                    <input type="text" id="name" placeholder="ضيفنا العزيز..." class="input-field" oninput="clearError('name')">
                    <div id="name-error" class="error-msg">يرجى إدخال الاسم كاملاً</div>
                </div>
                <div>
                    <input type="tel" id="phone" value="05" maxlength="10" class="input-field font-mono font-bold tracking-widest" oninput="handlePhone(this)" onkeydown="lockPrefix(event)">
                    <div id="phone-error" class="error-msg">رقم الهاتف يجب أن يتكون من 10 أرقام</div>
                </div>
            </div>
            <button id="nextBtn" onclick="checkUser()" class="mocha-btn mt-8">متابعة ⮕</button>
        </div>

        <div id="step2" class="step-container">
            <h2 class="text-white text-center text-xl font-bold mb-2">متى نحتفل بميلادك؟ 🎉</h2>
            <p class="text-white/40 text-center text-[10px] mb-8 uppercase tracking-widest">أدخل التاريخ بلمسة واحدة</p>
            <div class="flex flex-col items-center">
                <div class="flex justify-center gap-3" style="direction: ltr;">
                    <input type="tel" id="day" placeholder="DD" maxlength="2" class="dob-box" oninput="autoNext(this, 'month')">
                    <input type="tel" id="month" placeholder="MM" maxlength="2" class="dob-box" oninput="autoNext(this, 'year')">
                    <input type="tel" id="year" placeholder="YYYY" maxlength="4" class="dob-box dob-box-year" oninput="checkReady(this)">
                </div>
                <div id="dob-error" class="error-msg">يرجى التأكد من صحة التاريخ</div>
            </div>
            <div class="flex items-center gap-4 mt-12">
                <button onclick="goToStep1()" class="text-white/30 text-xs">رجوع</button>
                <button onclick="submitFinal()" id="submitBtn" class="mocha-btn !mt-0 flex-1">انضم لعائلة موكا ✨</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, where, getDocs, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyAxGd0JSGNlVMBzPBN5gojbMuLht828OdU",
            authDomain: "mocha-resto.firebaseapp.com",
            projectId: "mocha-resto",
            storageBucket: "mocha-resto.appspot.com",
            messagingSenderId: "542360253487",
            appId: "1:542360253487:web:7a8100171966957a069e2b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const d = document;

        // دوال التحكم بالمدخلات والتنسيق
        window.handlePhone = (i) => { 
            i.value = i.value.replace(/[^0-9]/g, ''); 
            if (!i.value.startsWith('05')) i.value = '05' + i.value.replace(/^0+/, ''); 
            window.clearError('phone');
        };

        window.lockPrefix = (e) => { if ((e.key === 'Backspace' || e.key === 'Delete') && e.target.selectionStart <= 2) e.preventDefault(); };
        
        window.autoNext = (curr, nextId) => { 
            curr.value = curr.value.replace(/[^0-9]/g, ''); 
            window.clearError('dob');
            if(curr.value.length >= curr.maxLength) d.getElementById(nextId).focus(); 
        };

        window.checkReady = (i) => { 
            i.value = i.value.replace(/[^0-9]/g, ''); 
            window.clearError('dob');
            if(i.value.length === 4) d.getElementById('submitBtn').classList.add('ready-to-go'); 
            else d.getElementById('submitBtn').classList.remove('ready-to-go'); 
        };

        window.showError = (id, msgId) => {
            const el = d.getElementById(id);
            const msg = d.getElementById(msgId);
            el.classList.add('shake-error');
            msg.classList.add('visible');
            setTimeout(() => el.classList.remove('shake-error'), 500);
        };

        window.clearError = (id) => {
            const el = d.getElementById(id);
            if(el) el.classList.remove('shake-error');
            const msg = d.getElementById(id + '-error') || d.getElementById('dob-error');
            if(msg) msg.classList.remove('visible');
        };

        // الميزة الجديدة: التحقق من الزبون قبل الانتقال للخطوة التالية
        window.checkUser = async () => {
            const name = d.getElementById('name').value.trim();
            const phone = d.getElementById('phone').value;
            const nextBtn = d.getElementById('nextBtn');

            let hasError = false;
            if (name.length < 3) { window.showError('name', 'name-error'); hasError = true; }
            if (phone.length < 10) { window.showError('phone', 'phone-error'); hasError = true; }
            if (hasError) return;

            nextBtn.disabled = true;
            nextBtn.innerText = "جاري التحقق...";

            try {
                const q = query(collection(db, "customers"), where("phone", "==", phone));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    // الزبون موجود مسبقاً -> تحديث عدد الزيارات فقط
                    const userDoc = querySnapshot.docs[0];
                    await updateDoc(doc(db, "customers", userDoc.id), {
                        visits: increment(1),
                        lastVisit: serverTimestamp()
                    });

                    const toast = d.getElementById('toast');
                    toast.innerText = `أهلاً بك مجدداً يا ${userDoc.data().name}.. نورتنا! ✨`;
                    toast.classList.add('show');
                    
                    setTimeout(() => {
                        toast.classList.remove('show');
                        d.getElementById('successMessage').innerText = "نورتنا من جديد في عائلتك! ✨";
                        d.getElementById('successCard').style.display = 'flex';
                    }, 1800);

                } else {
                    // زبون جديد -> الانتقال لجمع تاريخ الميلاد
                    d.getElementById('step1').classList.remove('step-active');
                    d.getElementById('step2').classList.add('step-active');
                    d.getElementById('progress').style.width = '100%';
                }
            } catch (e) {
                console.error(e);
                alert("حدث خطأ في الاتصال");
            } finally {
                nextBtn.disabled = false;
                nextBtn.innerText = "متابعة ⮕";
            }
        };

        window.goToStep1 = () => {
            d.getElementById('step2').classList.remove('step-active');
            d.getElementById('step1').classList.add('step-active');
            d.getElementById('progress').style.width = '50%';
        };

        // حفظ بيانات الزبون الجديد بشكل نهائي
        window.submitFinal = async () => {
            const day = d.getElementById('day').value;
            const month = d.getElementById('month').value;
            const year = d.getElementById('year').value;
            const btn = d.getElementById('submitBtn');

            if (!day || day > 31 || day < 1 || !month || month > 12 || month < 1 || year.length < 4 || year < 1940) { 
                window.showError('day', 'dob-error');
                return; 
            }

            btn.innerText = "جاري الحفظ...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "customers"), {
                    name: d.getElementById('name').value,
                    phone: d.getElementById('phone').value,
                    dob: `${day.padStart(2,'0')}/${month.padStart(2,'0')}/${year}`,
                    visits: 1,
                    createdAt: serverTimestamp(),
                    lastVisit: serverTimestamp()
                });
                d.getElementById('successMessage').innerText = "أهلاً بك في عائلة موكا! ✨";
                d.getElementById('successCard').style.display = 'flex';
            } catch (e) {
                console.error(e);
                alert("حدث خطأ في الاتصال");
                btn.disabled = false;
                btn.innerText = "انضم لعائلة موكا ✨";
            }
        };
    </script>
</body>
</html>
