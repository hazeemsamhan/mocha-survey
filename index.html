<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocha Resto Café | سجل بياناتك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* التنسيق اللوني بناءً على شعار موكا المرفق */
        body { background-color: #5D1F3C; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .mocha-accent { background-color: #D5D6D8; color: #5D1F3C; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 text-white">

    <div class="glass max-w-md w-full rounded-3xl p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-5xl font-black tracking-tighter text-[#D5D6D8] uppercase">MOCHA</h1>
            <p class="text-slate-300 mt-2">Resto Café | انضم إلينا ☕</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-sm mb-2 text-slate-300 text-right">الاسم الكامل</label>
                <input type="text" id="name" placeholder="أدخل اسمك..." 
                    class="w-full bg-[#3a1426] border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-[#D5D6D8] transition-all">
            </div>

            <div>
                <label class="block text-sm mb-2 text-slate-300 text-right">رقم الهاتف</label>
                <input type="tel" id="phone" placeholder="059xxxxxxx" 
                    class="w-full bg-[#3a1426] border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-[#D5D6D8] transition-all text-left" dir="ltr">
            </div>

            <div>
                <label class="block text-sm mb-2 text-slate-300 text-right">تاريخ الميلاد</label>
                <input type="date" id="dob" 
                    class="w-full bg-[#3a1426] border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-[#D5D6D8] transition-all">
            </div>

            <button onclick="saveData()" id="submitBtn"
                class="w-full mocha-accent font-bold py-4 rounded-xl shadow-lg transform active:scale-95 transition-all text-lg">
                انضم لعائلة Mocha 🎁
            </button>
        </div>

        <div id="successMsg" class="hidden mt-6 text-center text-[#D5D6D8] font-bold animate-pulse">
            تم تسجيلك بنجاح! ننتظرك في Mocha.
        </div>
    </div>

    <script>
    async function saveData() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const dob = document.getElementById('dob').value;
        const btn = document.getElementById('submitBtn');

        if(name && phone && dob) {
            btn.innerText = "جاري الحفظ... ☕";
            btn.disabled = true;

            try {
                // استخدام الرابط الخاص بك من SheetDB
                const response = await fetch('https://sheetdb.io/api/v1/00uxk32jqdk1u', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        data: [
                            {
                                'name': name,
                                'phone': phone,
                                'dob': dob,
                                'date': new Date().toLocaleString()
                            }
                        ]
                    })
                });

                const result = await response.json();
                
                if(result.created === 1) {
                    document.getElementById('successMsg').classList.remove('hidden');
                    alert("أهلاً بك في Mocha يا " + name + "! تم تسجيلك بنجاح.");
                    document.getElementById('name').value = '';
                    document.getElementById('phone').value = '';
                    document.getElementById('dob').value = '';
                }
            } catch (error) {
                console.error("Error:", error);
                alert("حدث خطأ في الاتصال. تأكد من إعدادات SheetDB.");
            } finally {
                btn.innerText = "انضم لعائلة Mocha 🎁";
                btn.disabled = false;
            }
        } else {
            alert("يرجى تعبئة جميع الحقول.");
        }
    }
    </script>
</body>
</html>
